<script>
const FORMSPREE_URL = "https://formspree.io/f/mvzdggww";
const PAIR_NR = 1;
const INTERVIEWS = [{"id": "real_01", "label": "Anna-Liisa", "role_hint": "tootedirektor", "blocks": [{"nr": 1, "title": "SISSEJUHATUS JA TAUST", "tpb": null, "qa": [{"type": "k", "k": "K1", "q": "Kirjelda palun oma ettevõtet – millega see tegeleb ning milline on sinu enda roll ettevõttes.", "a": "Meie ettevõte on dokumendihalduse tarkvara arendav ettevõte, et nad on seda juba 25 aastat teinud. Nad on mõnes mõttes nii-öelda turu arvamusliider ja vist ka turuliider endiselt täna dokumendihalduse valdkonnas. Ja dokumendihaldus on faili haldusest, ehk siis ma ei tea, Dropboxid ja sellised teenused — veidi erinev. Dokumendihaldus on täiesti eraldiseisev valdkond, mis on väga reguleeritud selles vaates, et mismoodi seda infot seal hallatakse, ja sellele on lausa magistrikraad. Ta pakub, nii-öelda, eelkõige — kirjeldab seda ja pakub siis tarkvarana teenusena võimalust ettevõtetel, kes on väga reguleeritud valdkondades, oma dokumente ja informatsiooni meie protsesside või meie tarkvara abil hallata täpselt niimoodi, nagu seadus seda ette näeb. Et sa peaksid hoidma alles raamatupidamisdokumendid 7 aastat ja ja kõikvõimalikud muud, nii-öelda, avalikuks kasutamiseks või piiratud, nii-öelda, nähtavusega dokumendid. Võib-olla sa oled näinud, ma ei tea, riigis on mingisugused salastatud dokumendid, onju — et siis samamoodi on see võimalik selle tarkvaraga teha. Ja meie ettevõte pakubki sellist tarkvarateenust, nii-öelda tarkvara platvormi näol, ja lisaks pakub ka veel konsultatsiooniteenust ja koolitusteenust, et majasiseseid dokumendihaldureid, aga ka tavakasutajaid koolitada — selles vaates, mis on täna üldse võimalik turul dokumendihalduses teha, ja kuidas seda tarkvara paremini kasutada. Mis on dokumendihalduse alased, nii-öelda, eripärad, mida nad võib-olla ei oska ette näha, juhul kui dokumendihalduriks on saanud keegi näiteks personaliinimene ja tal ei olegi dokumendihalduse tausta. Vot, ja mina olen selles ettevõttes tootedirektor ehk siis mina vastutan tootejuhtide töö eest, kes siis otsustavad — kõigepealt hindavad mõjupõhjad, millised on kõige olulisemad, nii-öelda, arendusideed või probleemid, mida me võiksime arendada. Valideerivad seda kasutajate peal ja siis juhivad selle arenduse valmimist. Ja disainiosakond, kes samamoodi töötab palju kasutajatega, on minu valdkonnas."}, {"type": "k", "k": "K2", "q": "Millised on teie peamised kliendid ja kuidas sa nendega kokku puutud.", "a": "Meie peamised kliendid on tegelikult — meil on seinast sein, aga me ise näeme, et meie põhiline sihtturg on väga suured ja keerulises reguleeritud valdkonnas toimetavad ettevõtted, sealhulgas avalik sektor, kellel on kohustus informatsiooni teatud viisil ja teatud aegadeks või aegade vältel talletada. Ja kuidas mina kasutajatega kokku puutun, või klientidega — enamasti ma käin kas uute potentsiaalsete klientide, nii-öelda, kaardistamise või nende vajaduste kaardistamise ja esmaste pitch'ide koosolekutel, kus ma siis esindan tootevaldkonda ja, nii-öelda, viin selle informatsiooni. Vahetevahel teen ise ka kasutajaintervjuusid, küll enam mitte nii palju, ja ma tarbin, nii-öelda, intervjuu analüüsi tulemusi, mis on siis tootejuhtidelt või disaineritelt tulnud, ja aitan teha parimaid võimalikke otsuseid arendusprioriteetide osas. Ja kui on mõne kliendiga suurem plaava, siis käin nendega ka rääkimas ja leiame parima võimaliku viisi, kuidas nad saaksid meile kliendiks edasi jääda ja saaksid kõike seda, mida neil vaja on."}, {"type": "k", "k": "K3", "q": "Kirjelda oma rolli ettevõtte toote või teenuse arendustööde tegemisel ja otsuste tegemisel.", "a": "Minu roll on eelkõige seada siis vastavalt ettevõtte enda strateegiale ja eesmärkidele tootearendusstrateegia — ehk siis minu defineerida on see, kuidas tarkvaraarendus aitab sellel ettevõttel eesmärgid ära tuua. Mina kirjeldan laias laastus nüüd, nii-öelda, need alustalad või valdkonnad, milles me siis järgmised paar aastat peaksime enamjaolt arenema. Ehk siis, et näiteks meie jaoks see on — üks on see, kuidas dokument süsteemi saab. Ehk siis, et kui sul on vaja kuskilt välisest süsteemist seda sisestada või sa pead seda sisestama ise käsitsi otse sinna süsteemi, et siis see peab saama imelihtsaks selleks, et me saaksime olla oma konkurentidest paremad. Valdkond 2 on see, et kui dokument on juba selles süsteemis, et mida sa selle dokumendiga siis teha saad ja mida see dokument peab iseendaga tegema. Põhimõtteliselt ehk siis, et kui su raamatupidamisdokument peab saama kustutatud 7 aasta pärast, et siis kindlasti see ei peaks enam kasutaja kalendrisse seda panema, vaid et see süsteem võiks seda ise ära teha. Ehk siis ka see, mis dokumendiga toimub, peaks olema automatiseeritav või, nii-öelda, toimuma iseenesest, vastavalt sellele, mis varem on defineeritud või mis, ma ei tea, AI näiteks dokumendist välja loeb. Ja kolmas: kuidas seda informatsiooni, mis süsteemi on talletatud — paljudel meie klientidel on seda juba 25 aastat sinna talletatud — et kuidas siis tänaste vahenditega või tänase tehnoloogiaga, näiteks AI, seda informatsiooni kõige paremal võimalikul viisil juhtimisotsuste tegemiseks ära kasutada. Sellepärast, et seda informatsiooni on väga palju, varasemalt ei olnud võimalik teda tarbida väga hästi, sa pidid teadma, mida otsida ja kust kohast. Siis nüüd on AI võimeline täiesti erinevatest dokumentidest, erinevatest infoallikatest selle süsteemi sees konteksti kokku panema. Need on need kolm, nii-öelda, alustala, mis ma meie ettevõtte jaoks olen kirjeldanud. Selle järgi teevad tootejuhid otsuseid, mida arendada, et me sellest väljapoole ei lähe. Et kui meil on mingisugune innovaatiline mõte, siis, nii-öelda, teeme erandotsuse, kas me arendame või mitte, aga kõik arendused peavad kuuluma ühte nendest kolmest alast. Ja me mõõdame neid, ja mõõdikud on ka samamoodi tootevaldkonnas minu, nii-öelda, mõjumõõdikud on minu defineerida. Igas projektis lepime need eraldi kokku, täpsemad mõõdikud, aga vähemalt peavad kõik need arendused kas parandama kasutuskogemust olulisel määral või tooma uut revenue'd, ideaalis mõlemad. See on see, mis on minu kirjeldada, ja siis vastavalt sellele minu tootejuhid leiavad kõige mõjusamad võimalikud arendused või, nii-öelda, projektid, mida nad siis arvavad, et peaks järgmisena tegema. Ja minu ülesanne on siis kogu arendusportfelli tegelikult vastavalt sellele mõjule prioriseerida ja majasiseselt, nii-öelda, viia kogu see teadmine, mis me siis turult teada saime — eelkõige ka kasutajauuringutest — et miks me arvame, et just need on kõige mõjusamad. Sellepärast, et kogu juhatus peab tegelikult sellele arendusportfellile ja nendele prioriteetidele alla kirjutama, siis minu asi on teha ka seda lobitööd — et kui nende arendusprojektidega sinna juhatuse juurde minnakse, siis nad ka rohelise tule saavad, või vähemalt on juhatusel piisavalt informatsiooni, et häid küsimusi küsida. Et me kõik koos, nii-öelda, kõige paremal võimalikul viisil edasi läheme."}]}, {"nr": 2, "title": "PRAEGUNE ARENDUSPRAKTIKA", "tpb": "TPB: Behaviour (tegelik käitumine)", "qa": [{"type": "k", "k": "K4", "q": "Mõtle oma ettevõtte tavapärase toote/teenuse arendusele ja kirjelda palun, kuidas see protsess kujuneb algusest lõpuni.", "a": "Ma natukene sumin ka korra välja, et ma rääkisin sellest prioriteetide listist, aga see prioriteetide list tegelikult kujuneb kogu aeg ja pidevalt. See ei kujune siis, kui me hakkame midagi arendama, vaid neid ideid kogutakse — noh, kust iganes need siis tulevad, vahetevahel tulevad juhatusest, vahetevahel tulevad kliendiintervjuudest — ja neid pannakse pidevalt sinna nimekirja. Meil ei ole kahjuks veel välja kujunenud, kui tihti me seda tegelikult teeme. Ütleme keskeltläbi korra kvartalis me tuleme siis tootejuhtidega kokku ja hindame kõhutunde pealt ära selle, millised nendest ideedest võiksid olla kõige väärtuslikumad. Ja oluline on siin kohal, et tootejuhtide ja minu kõhutunne koosneks sellest, et me oleks enne piisavalt üle ujutanud kasutajaintervjuudest, kvantuuringutest, kõikvõimalikust analüütikast ja, nii-öelda, kasutajatelt ja turult tulnud infost — et meie kõhutunne ei oleks ainult meie isiklik arvamus. Aga ütleme, et see esimene reha, mis me teeme, on piisavalt hea. Tänase teadmise järgi, mis võiksid olla kõige mõjusamad asjad sellest listist, me võtame need valideerimisse — ehk siis järgmised kasutajaintervjuud, mille me teeme, kasvõi kui me testime juba mingi konkreetse teenuse uiksi, siis me selle, nii-öelda, vestluse käigus tavaliselt, nii-öelda, võtame mõne idee, mis selles vistis on veel valideerida, mis võiks selle sihtrühmaga kokku sobida. Ja me anname ka need ideed ühikirjeldustena oma äriarendusmeeskonnale, kes siis, nii-öelda, lähevad ja küsivad potentsiaalsetelt klientidelt, kellele see idee või see toode võiks sobida, ja katsuvad leida kolm klienti, kes on siis nõus eellepingut tegema. Sellepärast, et tootearenduses on selline lugu, et ükskõik kui palju sa kasutajauuringuid teed, lõplik tõde selgub siis, kui sa turule sellega lähed. Ja kui sa pärast saad teada, et tegelikult mitte kellelgi seda vaja ei ole, siis — eriti väikse ettevõtte puhul — sa oled teinud suure investeeringu, mis tegelikult taevast tuleb. Minu, nii-öelda, kogemuse põhjal kõige parem on see, kui sul on juba mingisugused, põhimõtteliselt, mingisugune ettemaks klientidelt olemas — see väga hästi valideerib seda, kas see tegelikult on vajalik. Või see on oi, ja see on väga hea idee, aga mitte mulle. Et see on tavaliselt selline nagu trapp, et kui me leiame mingisugustele nendele ideedele, mida meil on seal Eestis päris palju tegelikult, mingisugused pilootkliendid või eellepingud, siis need saavad tavaliselt, nii-öelda, prioriteediks. Nüüd, UX parendused, mis me ise teame, et me peame tegema, aga ükski klient ei ole nõus nende eest maksma — need on natukene erikeis, et need, nii-öelda, UX-parendused eesmärkide põhjal olen ma mingisuguse, nii-öelda, parima praktika põhjal turult katsunud rahaks arvutada. Ehk siis, et parem UX või parem kasutajakogemus võrdub, ma ei tea, tegelikult potentsiaalselt revenue's nii ja nii palju. Ma ei ole kindel, kas ma selle loogikaga edasi ei lähe, aga praegu tundub hea küll, lihtsalt selleks, et kasutuskogemuse parandused ei jääks alla rahalistele, nii-öelda, numbritele. Ja nüüd, kui meil on olemas see esimene valideerimine kõikidele nendele ideedele, siis me valime nendest... või õigupidi isegi ei vali välja, vaid me seame vastavalt sellele, mis me täna tagasisidena saime, selle ajajoonele, ja sellest formuleerub roadmap. Ja need, mis on siis kõige mõjusamad, need lähevad discovery'sse ehk siis, et me teeme sügavama kliendiuuringu nende jaoks, et siis aru saada, kas päriselt see probleem ikkagi on probleem ja mis see lahendus võiks olla, mida me arendame. Ja siis läheb see disaini ja siis läheb see arendusse."}, {"type": "interv", "q": "Ja kui arendus on nüüd valmis, siis edasi ka uuesti testite, või siis on juba see testimine kõik lõpule viidud selleks hetkeks?", "a": "Üldiselt mulle meeldib, kuna ma... see on võib-olla see koht, kus ma kalutatud olen. Ma peaasjalikult töötan väga suurte ja hästi keeruliste süsteemidega, tavaliselt nad on mingisuguse kriitilise tähtsusega, ehk siis vearuumi väga palju ei ole. Siis teeb, noh, teoreetiliselt innovatsiooni ja tootearenduse üsna keeruliseks, sellepärast et klientidele ei meeldi muutused sellistes valdkondades, mida ma teen. Sel juhul on see, et need tooted, mida me teeme, siis tootejuhtidega koos — need uued funktsionaalsused, mis tulevad, enamasti lähevad peale väiksemale grupile klientidele, kes on meiega juba piloodilepingu sõlminud."}, {"type": "k", "k": "K5", "q": "Kuidas te püüate aru saada, mida kliendid või kasutajad tegelikult vajavad?", "a": "Meil on tegelikult väga tore koosolek, kus siis nii kasutajatugi kui müügiinimesed tulevad ja räägivad kliendi probleemist. Me kogume need probleemid kokku ja hästi palju mustreid tuleb sealt — mitmetel klientidel on sama probleem, natukene võib-olla eri nurgast. Ja me saamegi nagu oma tootearenduse ideede ämbrisse uusi asju, aga ka teiselt poolt, nii-öelda, valideerimisse selle, mis on nagu need valusad kohad. Ühesõnaga, meie kliendisuhtlus ühest poolt käib läbi toote tiimi ja disainerite, kes proaktiivselt võtavad klientidega ühendust, et — kuule, ma tahaksin sinuga rääkida, või valideerida või testida midagi. Ja ka teiselt poolt, nii-öelda, äriarenduse ja müügi poolt ja kliendituge poolt, kes toovad neile mustreid ja tellimusi, mida me siis analüüsime. Ja me saadame tagasi nendega mingi lisaküsimused, et me mõistaksime kõikide puhul, mis see probleem on. Ja samamoodi aitab siis, nagu ma enne mainisin, äriarendus neid valideerida, potentsiaalselt — noh, ka neilt alguse saanud tooteideid, et kas see võiks olla see, mis siis lahendaks, ja kas sa oled nõus tegema eelkokkulepet."}]}, {"nr": 3, "title": "KLIENDI JA KASUTAJA ROLL ARENDUSES", "tpb": "TPB: Behaviour + Attitude", "qa": [{"type": "k", "k": "K10", "q": "Too palun üks konkreetne näide olukorrast, kus kliendi sisend muutis teie algset plaani, prioriteeti või lahendust. Kirjelda seda olukorda.", "a": "Hiljuti meil ongi täiesti uus platvorm, mida me tegelikult kõikidele veel live ei ole lasknud. Selle nimi on, nii-öelda, meie uus portaal. See arendati sellepärast, et me saime teada, pärast kliendiuuringutega alustamist umbes aasta aega tagasi, et suurem osa meie sellest 25-aastasest platvormist on arendatud peakasutajate ehk administraatorite ja dokumendihaldurite sõnade alusel, ja nemad siis on ka olnud selle lõppkasutaja hääl. Aga tegelikult, noh, see on tulnud läbi mingisuguse prisma, ja kui me hakkasime lõppkasutajatega otse rääkima, siis tuli välja, et tegelikult see on kasutuskogemuse mõttes kasutamatu. Me jõudsime arendusele, et kuigi adminid armastavad seda vana platvormi — me peame selle osa alles jätma, mis on hea seal ja mida nad väga hindavad — aga me peame nüüd täiesti teistsugust kasutuskogemust hakkama pakkuma läbi portaali. Nüüd meil on see portaal meie, nii-öelda, hinnangul piisava funktsionaalsusega ja peaaegu valmis. Aga kuna seal on hästi palju funktsionaalsust läbi 25 aasta, ja see, mis portaali jõudis, on, nii-öelda, osa sellest, siis me ikkagi otsustasime, et me läheme mitme pilootprogrammiga, nii-öelda, võimalikult erinevate klientidega, et me saaksime aru, kas me oleme nüüd siis päriselt ikkagi piisavad. Ühe, esimese, kõige suurema kliendiga juba avastasime, millised kitsaskohad meil on. Nende puhul me otsustasime, et see klient ei ole meie sihtklient, või seda tüüpi väga suured ja väga, nii-öelda, laiaulatuslike eriarendustega kliendid ei saa olla esimene, nii-öelda, grupp, kes siis seda portaali saab kasutama hakata — et see oleks meie jaoks ebamõistlik. Aga järgmised, siis, täpsemad sihtrühmad või täpsemalt meie vajadustega ja, nii-öelda, problem-solution-fit'iga kooskõlas kliendid andsid meile tagasiside, et meil on üks kindel funktsionaalsus — ehk siis suunamine — puudu. Kuigi me ise arvasime, et ilma suunamiseta saab hakkama küll, vähemalt esimesed kuud, siis nende hinnangul ikkagi ei saa, ja mitte mingil juhul. Ja me, nii-öelda, prioriteetsime selle skoopi natukene ümber niimoodi, et sellesse skoopi mahuks ikkagi suunamine ka, ja osad, siis, kliendiintervjuudest tulenevalt välja tulnud väiksema prioriteediga asjad jäid välja ja suunamine läks sisse. Ja see on siis pilootide põhjal. Nüüd, kui me pilootide põhjal selle skoobi lukku saame, siis pärast seda testime veelkord ja ilmselt läheme live'i."}]}, {"nr": 4, "title": "SUHTUMINE TEENUSEDISAINI / KASUTAJAKESKSUSESSE", "tpb": "TPB: Attitude + Behavioural Beliefs", "qa": [{"type": "k", "k": "K11", "q": "Millist väärtust sa näed kasutajakeskses lähenemises? Põhjenda oma arvamust.", "a": "Ma arvan, et... võib-olla vale inimene, kelle käest küsida. Minu vastus on see, et ilma kasutajateta ei ole võimalik head toodet arendada. See tähendab seda, et kogu arendus peakski olema ainult kasutajakeskne, sellepärast et kui see ei ole kasutajakeskne, siis sa arendad kahjuks ainult iseenda jaoks. Ja enamjaolt need inimesed, kes arendavad toodet, nad teavad juba liiga palju sellest valdkonnast. Noh, nüüd jätta vibe coding välja, eks, mis siis võimaldab igaühele täitsa oma tarkvara arendada. Ja kuna tarkvaraarendus on nii odav tänu sellele, siis ongi okei, kui see on piisav ainult ühele inimesele. Aga kui me nüüd räägime, ma ei tea, software as a service'ist või platvormidest, mis on paljudele, siis ainukene võimalik viis, kuidas olla edukas, siis ka finantsiliselt edukas, on see, kui sa kõnetad suurt hulka kasutajaid või kliente. Kui sa ei ole nende klientidega koos seda sisuliselt arendanud, siis on, noh, imeväike, kui mitte olematu võimalus, et su toode tegelikult kõnetab seda turgu. On mõned tooted, mida ma tean, mis on, noh, umbes nagu loteriimiljonäri, nii-öelda, võimalusega saanud edukaks pärast seda, kui inimesed on täiesti, nagu, vaakumis seda arendanud. Aga see ongi täpselt, noh, õnnemäng, onju, et vahetevahel loto-õnn naeratab sulle, aga suurema osa ajast, 99,9%, seda ei juhtu. Seega kliendikeskne, nii-öelda, tootearendus on ainukene viis, kuidas tagada seda, et sul on mingigi võimalus eduks turul. Ja noh, isegi kui sa esimese tootega välja tuled ja see läks õnneks, siis kui sa niimoodi jätkad, siis on suur võimalus, et sa investeerid tühja, et järgmine skoop tegelikult ei kõneta sinu turgu."}, {"type": "interv", "q": "Aga kas sul on kunagi tekkinud mingit kahtlust, et kas me ikka peaks nii palju küsima kliendilt?", "a": "Ütleme, et kahtlust ei ole, aga see on hästi selline huvitav joon, mida igapäevaselt siis tootedirektorina ja tootejuhina, nagu, mille pealt tantsida. Mis on see piisavalt pai otsus, mille ma saan teha, et mul on juba piisavalt palju infot ja ma ei pea minema küsima klientide käest — see on mingisugune no-brainer asi — versus, mida ma peaksin minema valideerima. See on alati nagu ressursihalduse küsimus. Ma ei arva, et tootearendus üleüldiselt... seda kahtlust mul ei ole mitte kunagi olnud, et see peab olema. Aga nüüd töö sees, kus see nagu niit jookseb, millised on piisavalt suured või piisavalt väiksed asjad, kus sa siis võid ka ilma kliendi tagasisideta minna — see on alati libe. Ma tunnistan, et ma olen ise selles näpu peale saanud ja, noh, saan ka kohe pitsa kätte pärast seda. Siis tuleb meelde küll, et võiks küsida, ja see ei ole nii keeruline. Ja noh, meie kui eestlaste, nii-öelda, kirstunael on ilmselt see, et me oleme introvertid. See tähendab seda, et lihtsam otsus on alati mitte minna küsima, lihtsalt sellepärast et see sotsiaalne, nii-öelda, osa sellest on nii raske. Jah, ehk siis — millal minna küsima, millal mitte. Ja selle jaoks mina ilmselt tootedirektorina olengi, et hoida meie mingisugust, nii-öelda, seda latti kõrgel, sest ma näen, et kui ma oma toote tiimidele seda kriteeriumiks ei seaks, siis isikuomandust tulenevalt inimesed ei taha minna küsima. Nad tahaksid lihtsalt, nagu, arendada ja oma, nagu, isale keskenduda, et see ei ole, nagu, see ei ole miski, mis tuleb loomulikult. See on siukene lihas, mida tuleb, nagu, jõusaalis harjutada kogu aeg."}, {"type": "k", "k": "K12", "q": "Millised on sinu meelest kasutajakeskse lähenemise kitsaskohad või piirangud?", "a": "No see on ressursimahukam. Või, ma ei ütleks, et seal on piirangud, aga see nõuab ressurssi, onju. Ja kui on inimesed, kes ei ole kliendikeskse tootearendusega varem kokku puutunud, siis nad näevad seda kuluna. Seda on väga keeruline välja selgitada, et see tegelikult pikemas perspektiivis hoiab aega kokku, sellepärast et sa saad kiiremini oma, nii-öelda, vastused kätte ja maandad riske. Piirangud ongi see, et kas sul on tegelikult, kas sa suudad oma aega ja ressursse niimoodi prioriseerida, et sa ikkagi teed selle ära. Ja teine piirang huvitaval kombel on tegelikult disainmõtlemine, mis oma, nii-öelda, siiani kirjeldatud struktuuride kohaselt tegelikult defineerib, mismoodi discovery ja kliendiuuringud peaksid välja nägema. Ja see on disainitud selliselt, et teha võimalikult palju tööd enne arendust ära. Aga AI tööriistadega täna arendus on väga odav. See tähendab seda, et ma arvan, et disainmõtlemise metoodikat tuleks ka vastavalt sellele ümber defineerida — et vahel on isegi need kliendiuuringud võib-olla ressursimahukamad kui mingisuguse kiire prototüübi valmis viskamine, mille jaoks sa peaksid minema lihtsalt intervjueerima kedagi. Kui sa saaksid juba valmis prototüübiga tema juurde minna ja öelda, et — kuule, mõtle nüüd sellele korrale, kui sa uudses frustratsioonis olid selles asjas. Sulle antakse selline asi: kuidas sa seda lahendaksid, või mis tunne on. See kvaliteet, mis sa saad sellisest kliendiuuringust versus hüpoteetilisest, kus sa teed lihtsalt mingisugust, nagu, intervjuud, kus te mõlemad lõpuks ette kujutate seda lahendust erinevalt tegelikult — see on küll üks piirang. Varasemalt oli hästi pai, nii-öelda — kas sa rääkisid inimestega hüpoteetiliselt, katsusid, nii-öelda, kõigepealt laialt aru saada, mis nende kogemused on, ja lõpuks jõudsid kitsamaks ja lootsid, et nad mõtlesid sama asja nagu sina, või katsusid, nagu, tantsida sellel joonel, et kuidas siis ikkagi oma küsimusi võimalikult hästi sõnastada, et sa ei kaalutaks seda kasutajat. Ja siis selle põhjal tegid mingisuguseid otsuseid, lootsid, et sa oled piisavalt palju, nagu, sellest välja pikkinud olulisi kohti tootejuhina, versus nüüd, kus sa saadki juba mingisuguse töötava asjaga nende juurde minna. Ma arvan, et täna see, mis nüüd siis disainmõtlemisest välja tuleb, mis iganes, nii-öelda, metoodikad või protsessid, et need on oluliselt vähem ressursimahukad, ja sa jõuad tegelikult nende vastusteni, mida sul kasutajatelt paja on, palju kiiremini."}]}, {"nr": 5, "title": "SOTSIAALSED JA PROFESSIONAALSED MÕJUTAJAD", "tpb": "TPB: Subjective Norm", "qa": [{"type": "k", "k": "K13", "q": "Kuidas sinu meeskond/kolleegid suhtuvad kasutajakesksesse lähenemisse ja miks?", "a": "Ütleme, see on nagu siukene kaheteraga mõõk, onju, et nad tegelikult väga usuvad sellesse ja nad on näinud neid tulemusi ja nad tahavad seda teha. Aga igapäevaelu tuleb tavaliselt vahele ehk siis, et nii palju asju on vaja teha selleks, et üks kvaliteetne tarkvaratükk live'iks, et tihtilugu need kasutajauuringud või see osa jääb — kõik mattub kõikide teiste asjade alla ja saab vähem, nii-öelda, tähelepanu. Kui mind ilmselt siin ei oleks, siis ma arvan, et seda oleks oluliselt vähem. Ma arvan, et operatiivsed tiimid või, nii-öelda, need, kes praktikaliselt asju läbi viivad, võib-olla ei saagi sellel tasemel igapäevaselt mõelda. Ka mina, kui ma olen tootejuht olnud, et siis ma olen märganud seda, kuidas see, nii-öelda, proaktiivne osa kannatab. Aga ma arvan, et see on ka ajuehitusest inimestel, nii-öelda, niimoodi, sellepärast et me oleme ju peaasjalikult reaktiivseks loodud. Sellepärast et kunagi ammu, kui tiiger põõsast välja hüppas, siis me pidime suutma reageerida, ja me reageerisime sellele, et kõht oli tühi ja oht oli kuskil, või mingisugused muud asjad. Nüüd siis tootejuhtimine ja kasutajauuringud on selline proaktiivse mõtlemise kõige, nii-öelda, suurem valdkond, onju. Ja kui sa ei ole harjunud proaktiivselt mõtlema ja sinu töö peaasjalikult on reaktiivne igapäevaselt, siis sa tegelikult ei tule intuitiivselt selle peale, et sa peaksid nüüd siis proaktiivselt mingisuguse osa mõtlema. See peab olema, tulema, nii-öelda, kõrgemalt. Ja loomulikult tiim peab ka seda uskuma, aga kui seda mantrat ei veeta juhtide poole pealt ja, nagu, ei suudeta selgitada, miks see vajalik on, siis see jääb vajaka. Minu, nii-öelda, ülesanne isiklikult on hinnata mõju, ja ma ei saa mõju hinnata, kui ma ei tea, kui oluline see potentsiaalne funktsionaalsus kliendile lõpuks on. Ja see on see, mida ma neile selgitan, ja nad saavad sellest väga hästi aru. Aga kas nad igapäevaselt iseenda käest seda küsivad? Ilmselt mitte."}, {"type": "k", "k": "K14", "q": "Kuidas juhtkond suhtub klientide kaasamisse arendusotsuste tegemisel? Miks?", "a": "No ütleme, et eks nad... ja meie ettevõte on siis üks nendest paljudest klientidest, kes on mind kutsunud enda ettevõttes tegema muudatusi, ja nad tavaliselt ei telli mult seda, et tule aita meil rohkem kliendikeskseks saada. Nad tulevad ja tellivad või kutsuvad mind, et ma nende, nii-öelda, arenduse, nii-öelda, finantsiliselt ka — või et see nende arendused oleks taas investeeringud ja sellest tuleks mingisugune, nii-öelda, ka kasum tagasi ettevõttele. Ja tavaliselt siis selle käigus selgub ka see, et nad ei tee kliendikeskset tootearendust, ja nad arendavad, ma ei tea, pimesi ja mustas kastis. Loomulikult siis kogu aeg arendajad arendavad, onju, tulevad uued tooted turule, keegi neid ei taha osta, onju, ja arendame järgmist asja, otsitakse erinevaid süüdlasi. Miks see niimoodi on, et ükski arendatud asi tegelikult turul ei lenda — et sellest tuleb siis välja, et nad ei ole kliendikesksed. Ütleme, et alguses on skeptsis väga suur, et miks me peame sinna nii palju aega panema, et meil läheb niikaua kauem, et midagi turule tuua. Aga kui esimene, nii-öelda, pääsuke on käes või esimene tagasiside tuleb, ja see on hoopis teistsugune kui varasemalt tagasiside, siis see usk tuleb. Tänaseks ma ütleks, et ma olen, noh, praeguses ettevõttes 2 aastat töötanud, et juhatuses ei ole mitte kellelgi küsimust ka selle koha pealt, kas klientide tagasiside ja kliendikesksus võiks olla üks meie kriteeriumitest või mitte. Seda kiirustamist, või et saaks ikkagi kiiremini seda teha, seda ikka on, aga see on võib-olla... ma ei tea, natuurist põhineb, et tegevjuhtidel on tavaliselt alati väga kiire kuskile."}, {"type": "k", "k": "K15", "q": "Kuidas on sinu suhtumist või praktikaid mõjutanud laiem ettevõtluskeskkond, näiteks kiirendid, mentorid, sarnased ettevõtted või konkurendid? Miks?", "a": "Raske öelda, sellepärast et, noh, nad tahtsid, või meie koostöö algas niimoodi, et tegelikult tegevjuht pöördus minu poole ja tahtis mind tööle võtta. Ma ütlesin, et ma ei taha tööle tulla, siis ta võttis kellegi teise tööle, ja aasta aega hiljem tuli ikkagi, ütles, et — kuule, aga võtame selle konsultatsiooni. Ehk siis ta oli ise juba ennast kuidagi, nagu, veennud selles, et midagi peab muutuma. Me ei tea, kas — nagu, ma ei ütleks, et see oli kliendikesksus, mida ta tahtis tegelikult muuta. Küll aga ta tahtis oma ettevõtet kasumlikumaks muuta läbi selle, et nüüd siis oleks tootejuhtimine ka seal. Nüüd, nagu, laiemas pildis — minu mentor on näiteks kiirendites, ja ma tean, et vähemalt early stage ettevõtted küll on... ma ei tea, paar nädalat tagasi käisin Teaduspargis koolitamas, ja üks ettevõtetest, kes oli käinud ka minu juures mentorluses varasemalt või suunatud sinna, tänas mind selle eest, et ma julgustasin neid oma tootega võimalikult kiiresti klientide juurde minema. Et nüüd nad on aru saanud, kui palju erinevaid kliendisegmente neil tegelikult on, mida nad selle peale ise ei oleks tulnud. Ja nüüd neil on päriselt valik, millise kliendisegmendiga edasi minna — et siukest asja nagu varem ei olegi olnud. Aga tegelikult, noh, ikka — sa saad sealt kiirendist selle, mingisuguse, kogemuse, et sa pead rääkima klientidega. Ma ei tea, kui kliendikeskseks nad saavad, nii-öelda, oma mindseti poole pealt, aga vähemalt nad saavad selle alustala, nii et neil on mingisugune kogemus selle koha pealt, kuidas kliente siis ikkagi uurida. Ma arvan, et nad päris nagu nulli pärast seda ei lange — ilmselt nad teavad ühel hetkel sinna tagasi tulla, kui nad oma ettevõtte, nii-öelda, arengus sinna jõuavad, et neil on järgmisi ideid vaja või midagi valideerida. Nad vähemalt teavad, kuidas seda teha. Ma arvan, et see kindlasti mõjutab. Nüüd Eestis on toote arendus, nagu, kliendikesksusest, nii-öelda, keskmiselt väga palju maas, võrreldes kõigi või, nagu, eriti Ameerika turuga. Ma ei oska öelda — ma arvan, et sellised kiirendid ja, ma ei tea, disainisprindid ja koolitajate näol, nagu, mida tehakse — see ongi see, kuidas see vaikselt imbub ettevõtetesse. Ja see teadmine tuleb, disainmõtlemine ja disainmõtlemine peaasjalikult on praegu nagu hästi viimase, ma ei tea, 5 aasta jooksul turundusliku terminina, ma arvan, juurdunud. Ehk siis, et seda osatakse juba küsida ja koolitada ka. Aga et kuidas sealt siis edasi — et see disainmõtlemine viiks ka äriliste tulemusteni — see võib-olla on see, mis on täna küsimus. Aga disainmõtlemine, ma arvan, on täitsa juba, nagu, tuttavlik. Iseasi, kas seda, nagu, praktiseeritakse, aga vähemalt kõik teavad, mis asi see on."}]}, {"nr": 6, "title": "VÕIMEKUS JA BARJÄÄRID", "tpb": "TPB: Perceived Behavioural Control", "qa": [{"type": "k", "k": "K17", "q": "Kirjelda ühte olukorda, kus oleksid tahtnud klienti rohkem kaasata, aga see ei õnnestunud. Mis sai takistuseks ja miks?", "a": "Jaa, ma mäletan. Üks minu tööandja — see oli nüüd küll juba päris ammu aega tagasi — mina läksin sinna ettevõttesse tööle tootejuhina. Duš oli see esiteks, et mingit tootejuhtimist, kui sellist, seal ei olnud. Seal oli peaasjalikult projektijuhtimine, ehk siis eelarve ja tähtajad. Ja mina siis ütlesin, et ei-ei-ei, et mina niimoodi ei saa, et mina tahaksin kõigepealt analüütikat saada, ja palusin selle arendajatel peale panna. Ja selle peale ettevõtte tehnoloogiajuht tuli minu juurde, ütles, et niimoodi meil ikkagi asjad ei käi, et sa paned sinna analüütika külge ja vaatad lihtsalt, onju. Me oleme ikkagi seda tüüpi, et... ma sain, noh, tagantjärgi aru, et ongi reguleeritud valdkond, aga ega ta minuga kaasa tegelikult ei olnud nõus mõtlema, et kuidas siis saaks. Ja ei selgitanud, et — meil on, me oleme reguleeritud valdkond, et me peame mingisugusel viisil seda tegema, või et me peame mõtlema nüüd. Vaid vastus oli lihtsalt ei, et meil analüütikat siia külge panna ei saa, ja nii on. Selles ettevõttes ei tehtud ka kasutajauuringuid, sellepärast et ka jällegi vabandusega, et reguleeritud valdkond ja me ei saa ja me ei tohi. Tegelikult tagantjärgi — ma olen selles valdkonnas veel kord töötanud — saab ja tohib. Aga selleks peavad olema inimesed, kes on nõus mõtestama tänaseid protsesse ümber, mitte lihtsalt oma, nii-öelda, mugavusest edasi sõitma."}, {"type": "interv", "q": "Mis sa arvad, millised ressursid või puudused seal ettevõttes olid? Miks oli see teadmine, et nad lihtsalt ei tahtnud?", "a": "Ma arvan, et kaks poolt. Selles spetsiifilises ettevõttes oli, nii-öelda, mugavus teha asju niimoodi nagu me alati oleme teinud. Et see spetsiifiline inimene oma tööd väga sisuliselt ei teinud, et ta oli väga mugavas positsioonis juhina. Ja lihtsalt niimoodi oli, ja ta ei tahtnud mugavusest välja tulla. Aga avalikus sektoris on näiteks hirm midagi valesti teha — et kõik uus, onju, alati nagu selline avastamise töö, sa võid saada tagasisidet, et sa oledki midagi valesti teinud. Ja avalikus sektoris on see hirm, et me teeme midagi valesti — kas juriidiliselt või, et ma ei tea, avalik arvamus, nagu, rõhub meid pärast seda, või midagi muud. Paljudes ettevõtetes tegelikult see hirm teadmatuses, et — me nüüd proovime kuidagi teistmoodi, et mis siis saab, kes vastutab, ja, et — äkki ma saan karistada selle eest. See on hästi suur teema."}]}, {"nr": 7, "title": "TULEVIKUVAADE JA KAVATSUSED", "tpb": "TPB: Intention", "qa": [{"type": "k", "k": "K18", "q": "Kuidas soovid muuta tänast protsessi kliendi kaasamise vaates järgmistes arendustöödes?", "a": "No toon sulle näite. Üks suur Eesti meediamaja tellis mult hiljuti koolituse, tahtsid vibe-coding'ut saada. Aga siis me, nagu, mõtlesime koos, et mida nad siis ikkagi sellega saavutada tahavad. Ja nende suur probleem, noh, ajas sees on see, et täna kogu maja kasutab erinevaid tööriistu selleks, et, nii-öelda, kirjutada sisendit, mis asju on vaja arendada, või siis seostada. Noh, on hästi suur kontsern, aga nad ise läbi ei mõtle seda, et mida neil siis tegelikult vaja on. Ja me siis otsustasime, et me teeme neile, noh, wipcoding'u bootcamp'i, kus nad — kõik osakonnad, siis personal, mingisugune toimetus, IT samamoodi, klienditugi — kes on midagi tellinud kõikides osakondades, tulevad tiimid ja wipecoding'ivad valmis oma selle asja, mida nad siis tellisid, lähevad valideerivad kliendi peal, intervjueerivad, ja kuni nad jõuavad siis 2 kuuga selle lõpliku tulemuseni. Ja siis lõpus pitchivad seda sellele, nii-öelda, spetsiifilisele meediamaja juhatusele — või isegi võib-olla grupi tasemel — et mis nad siis, nagu, tahavad, või mis on need funktsionaalsused, mis on vajalikud, mis nad on teada saanud juba enda lõppkasutajatega, kes siis on majasisesed või majavälised. Ja siis otsustatakse selle kitchi põhjal, kas see ehitatakse valmis või see ostetakse sisse. Sellepärast, et, noh, personalitarkvara puhul võib-olla on vaja sisse osta. Aga võib-olla, kui sul on onboarding'u tööriist, võib-olla ongi okei, et sa oled — live peale siis — selle valmis teinud, ja see jääbki niimoodi, et majasisesed turvainimesed vaatavad selle üle ja teevad sellele muudatused vastavalt sellele, kuidas vaja on. Aga nende eesmärk on saada parem sisend tellijalt juba. Et see ei ole enam tootejuht, vaid juba tellija peab saama paremaks oma ootuste ja vajaduste kirjeldamisel. Et sa ei võtaks mingisugused bullet point'id copy-paste'ist ChatGPT-st ja ütled — ma tahan seda kõike saada, tahaks jõuluks fondi saada, aga mis see siis täpselt tähendama hakkab? Mis on, ma arvan, väga tervitatav — et see on üks näiteks, nii-öelda, suund, mille kohapealt ma olen väga excited. Ma arvan, et igal pool see niimoodi toimima ei hakka, aga ma arvan, et vibe coding saab olema väga suur osa, nii-öelda, kliendiuuringutest, või peab saama. Täna, ma ei tea, üks suur Eesti teleettevõte on öelnud, et nemad ei võta tootejuhti, kes ei oska vibe-code'ida, enam tööle. Ja nii edasi. Mida see tähendab tegelikult — seda ei tea keegi. Aga peaasjalikult, et sa pead suutma prototüüpida, ja mitte ainult tootejuht ei pea suutma, vaid kõik sinu, nii-öelda, majasisesed stakeholder'id, kes midagi tellivad, nad peaksid suutma süsteemimõtlemist ja disainmõtlemist tegelikult kasutada."}, {"type": "k", "k": "K20", "q": "Kas on midagi, mida sa tahaksid veel lisada, mis jäi käsitlemata?", "a": "Lihtsalt, et kui sa mõtled selle peale, et, nii-öelda, kasutada AI'd ja, nii-öelda, tehispersoonasid, siis mina kasutan täna NotebookLM'i selle jaoks, et ma panen, nagu, teatud spetsiifiliste segmentide või kasutajatüüpide intervjuud kõik NotebookLM'i. Ja pärast minu tootejuhid juba küsivad NotebookLM'i käest, nagu, mingisuguseid küsimusi — ilma selleta, et nad peavad siis intervjueerima minema. Ma ei tea, kas see on see, mida sa otsisid, aga see, nii-öelda, mingil määral me seda tehnoloogiat juba kasutame küll. Aga ma ei luba neil ainult selle pealt. Nad kogu aeg peavad juurde panema sinna neid intervjuusid, et iga asja jaoks nad jälle küsivad mingisuguseid asju ja jälle ei sõidaks seda sama rada."}]}]}, {"id": "synth_01", "label": "Raivo", "role_hint": "omanik ja juhataja", "blocks": [{"nr": 1, "title": "SISSEJUHATUS JA TAUST", "tpb": null, "qa": [{"type": "k", "k": "K1", "q": "Kirjelda palun oma ettevõtet – millega see tegeleb ning milline on sinu enda roll ettevõttes.", "a": "Meie ettevõte tegeleb külmaseadmete hoolduse, remondi ja paigaldusega, põhiliselt poodidele, kohvikutele ja väiksematele toidutootjatele üle Eesti, kuigi suurem osa tööst jääb ikkagi Harjumaa ja lähikonna kanti. Meid on kuus inimest ja oleme nüüdseks kaheksa aastat tegutsenud; alguses olime sisuliselt pereäri, mina tegin ise põhitöö ära ja teised aitasid, aga viimastel aastatel oleme püüdnud asja natuke sirgemaks ajada, et ei elaks ainult erakorralistest väljakutsetest. Minu roll on noh, ametlikult omanik ja juhataja, aga päriselus tähendab see, et ma vastan klientide kõnedele, vaatan pakkumised üle, lahendan keerulisemad jamad objektil ja õhtul istun numbritega. Ehk siis mul on käed üsna igal pool sees.\n\nMeil on üks püsiv mure see, et kliendid tahavad abi kohe, eriti suvel, kui vitriin või külmkamber seisma jääb. Üks konkreetne näide oli eelmisel suvel, kui ühel väiksel pagaritootjal läks külmaruum reede õhtul rivist välja ja tal oli nädalavahetuse kaup sees. Mina olin ise juba päeva lõpetamas, aga sõitsin kohale, sest kui selline klient kauba maha kannab, siis ta ei vaata pärast, mis põhjus oli, ta mäletab ainult seda, kas sa tulid või ei tulnud. Saime asja ajutiselt jooksma ja pärast sellest tekkis meil nendega hooldusleping, sest ma ütlesin neile otse, et odavam on ennetada kui reede õhtul paanikas helistada. Selliseid lugusid ongi meil palju ja nende pealt ma olen aru saanud, et mu töö ei ole ainult tehniline pool. Ma pean otsustama, mida me üldse pakume, mis hinnaga, kellele ja kuidas nii, et meeskond jõuaks ära teha ega põleks läbi. Vahel tahaks rohkem delegeerida, aga kui asi läheb kliendi ees viltu, siis lõpuks tuleb see ikka minu lauale tagasi."}, {"type": "k", "k": "K2", "q": "Millised on teie peamised kliendid ja kuidas sa nendega kokku puutud.", "a": "Meie peamised kliendid on poed, kohvikud ja väiksemad toidutootjad, kellel külm peab kogu aeg töötama. Ma puutun nendega ise otse kokku, võtan kõnesid vastu ja käin keerulisematel objektidel kohal."}, {"type": "k", "k": "K3", "q": "Kirjelda oma rolli ettevõtte toote või teenuse arendustööde tegemisel ja otsuste tegemisel.", "a": "Minu roll on päris otse see, et kui midagi uut teenusesse lisame või töökorraldust muudame, siis see tuleb enamasti minu laualt läbi. Ma kuulan, mida kliendid telefonis räägivad, kus nad närvi lähevad, kus tekib seisak, ja siis vaatan õhtul numbreid otsa, et kas see asi üldse kannab. Näiteks hoolduslepingute poole oleme rohkem liikunud sellepärast, et juhutööde peal oli kogu aeg üks tulekahju teise otsa ja meeskond jooksis laiali. Mehed ütlevad ka oma arvamuse välja, aga lõplik otsus jääb ikkagi mulle, sest kui midagi läheb valesti, siis klient helistab lõpuks ju mulle."}]}, {"nr": 2, "title": "PRAEGUNE ARENDUSPRAKTIKA", "tpb": "TPB: Behaviour (tegelik käitumine)", "qa": [{"type": "k", "k": "K4", "q": "Mõtle oma ettevõtte tavapärase toote/teenuse arendusele ja kirjelda palun, kuidas see protsess kujuneb algusest lõpuni.", "a": "Meil see asi ei käi nii, et istume maha ja teeme suure arendusplaani, pigem hakkab kõik kuskilt korduvast jamast pihta. Kui ma kuulen telefonis juba mitmendat korda sama muret, et tehnikut ei saa kiiresti kätte või klient ei tea, millal hooldus üldse järgmine kord tuleb, siis ma saan aru, et seal on koht, mida peab paika sättima. Siis ma vaatan paar nädalat otsa, kui tihti see probleem päriselt kordub, palju meil selle peale aega läheb ja kas sellest saaks teha mingi selgema teenuse, mitte lihtsalt juhusliku lubaduse. Tavaliselt räägin selle meie poistega hommikul läbi, et kas see on üldse tehtav või hakkan ma jälle midagi õhku lubama.  \n\nÜks konkreetne näide oli hoolduslepingutega. Varem tegime nii, et klient helistas siis, kui kapp juba soe oli, ja meie jooksime. Eelmisel aastal oli üks väike toidutootja, kellel läks kahe kuu jooksul kolm korda sama külmkamber rivist välja, ja iga kord oli paanika, sest kaup seisis sees. Pärast kolmandat korda istusin õhtul numbritega maha, vaatasin palju me sinna tunde ja sõitu alla panime, ja sain aru, et nii ei ole mõtet. Siis pakkusin neile kindla kuutasuga hooldust, et käime ette kokkulepitud graafikuga, mõõdame asjad üle, puhastame kondensaatorid ja vaatame enne suuremaid rikkeid. Alguses oli see natuke konarlik, sest meie endal polnud head süsteemi, kes millal minema peab, ja paar korda läks kuupäev nihkesse. Aga kliendi pealt oli kasu kohe näha: väljakutseid jäi vähemaks ja meil oli vähemalt üks töö ette teada, mitte ei tulnud kõik tulekahjuna. Nii see meil enamasti kujunebki, et probleem, siis väike proov, siis parandame käigu pealt, ja kui töötab, jätame sisse."}, {"type": "k", "k": "K6", "q": "Kirjelda ühte hiljutist arendamise teekonda algusest kuni arenduse lõpuni.", "a": "Üks hiljutine asi oli see, kui me panime hoolduslepingute klientidele eraldi reageerimise korra paika, sest enne olid kõik kõned sisuliselt ühes hunnikus ja need, kes maksid igakuist hooldust, ei saanud alati kiiremini abi kui juhukliendid. See algas sellest, et kaks püsiklienti ütlesid üsna otse, et kui nad maksavad lepingut, siis nad ei taha kuulda sama juttu nagu ühekordne helistaja. Ma vaatasin õhtul paari kuu väljakutsed üle, panin kirja, kui palju meil läheb aega plaanivälistele sõitudele, ja selle pealt tegime lihtsa korra: lepingukliendile kindel reageerimisaeg, hooldused kalendrisse ette ja üks tehnik hoiab igal nädalal natuke varu. Täiesti puhtalt ei jooksnud, sest hooajal vajus see kord ikka vahel laiali, aga lõpuks jäi asi pidama ja täna on vähem vaidlust selle üle, kelle juurde enne minna."}, {"type": "k", "k": "K6.1", "q": "Keda ja miks te kaasasite?", "a": "Selles konkreetses muudatuses kaasasin kõigepealt oma tehnikud, sest nemad näevad päris elus ära, kus päev tuksi läheb ja mis lubadused on reaalselt tehtavad. Siis rääkisin läbi paari püsikliendiga, kellel on mitu seadet ja kelle jaoks isegi paaritunnine seisak tähendab juba raha kadu; tahtsin aru saada, mis neile tegelikult tähtis on, kas kiirus, kindel kellaaeg või lihtsalt see, et keegi vastaks. Raamatupidamise poole vaatasime ka üle, et kas see hoolduslepingu hind üldse katab selle kiirema reageerimise ära. Noh, väga laia ringi me ei kaasanud, sest meil on kuus inimest ja kui kõik pikalt arutavad, siis töö jääb tegemata."}, {"type": "k", "k": "K6.2", "q": "Millest lähtusid otsuse tegemisel ja miks?", "a": "Ma lähtusin seal üsna lihtsast asjast: kus meil raha tuleb ja kus maine kõige rohkem pihta saab, kui me lubadust ei pea. Meil oli eelmisel kevadel selline periood, kus külmaletid ja väiksemad külmkambrid hakkasid soojade ilmadega riburada järgi andma, kõnesid tuli päevas mingi 20 ringis, aga tehnikuid on mul neli väljasõidul ja kõike lihtsalt ei jõua. Siis ma vaatasin päriselt kaks õhtut järjest numbreid, kes maksavad meile iga kuu hoolduslepingu eest, kui palju me nende pealt aastas teenime ja kui palju me nende pärast pärast vabandama peame. Sealt tuli üsna selgelt välja, et need kliendid, kes on juba lepinguga sees, ootavad õigusega kiiremat abi, aga meie kohtlesime neid sisuliselt samamoodi nagu juhuslikku helistajat. See ei olnud aus ega tark.\n\nÜks konkreetne näide oli ühe Tallinna kohvikuketiga, neil on kolm kohta ja nad maksavad meile regulaarset hooldust. Ühel reedel ei saanud nad oma vitriinkülmikut tööle ja samal ajal helistas mingi uus klient, kellel oli väiksem mure, aga kes lihtsalt karjus kõvemini telefoni otsas. Vanasti olekski päev läinud selle karjuja järgi paigast ära, aga siis ma otsustasin, et lepingu kliendid lähevad esimesse järjekorda, punkt. Põhjus ei olnud mingi peen süsteem, vaid see, et nemad hoiavad meid stabiilselt üleval ja neil on meiega kokkulepe olemas. Teine asi oli see, et ma tean oma peast, kui kalliks läheb kliendile üks päev seisakut, eriti toidukaupade puhul. Nii et otsus tuli ausalt öeldes rohkem valust kui inspiratsioonist — liiga palju tulekahjusid, liiga palju vabandamist, ja ma sain aru, et kui me seda korda ei tee, siis me jäämegi lihtsalt reageerima."}, {"type": "k", "k": "K6.3", "q": "Kuidas otsustasid, millist ideed tasub edasi arendada ja millest loobuda?", "a": "Vaatasin põhimõtteliselt kolme asja: kas klient küsib seda korduvalt, kas me jõuame seda päriselt ära teha ja kas see toob kas raha sisse või hoiab jama vähemaks. Kui tundus, et asi sööb meeskonna läbi või lubadust pidada ei suuda, siis jätsin katki."}]}, {"nr": 3, "title": "KLIENDI JA KASUTAJA ROLL ARENDUSES", "tpb": "TPB: Behaviour + Attitude", "qa": [{"type": "k", "k": "K7", "q": "Kuidas teie arendusmeeskond puutub kokku klientidega?", "a": "Meil eraldi arendusmeeskonda ei ole, sama punt teeb tööd ja kuuleb klienti otse. Mina võtan kõned, tehnikud on objektil ja sealt see päris tagasiside tulebki."}, {"type": "k", "k": "K9", "q": "Kirjelda kliendilt tagasiside kogumise protsessi.", "a": "Enamasti tuleb tagasiside telefoni pealt, objektil kohapeal või siis pärast töö lõpetamist, kui klient ütleb otse ära, mis oli hästi ja mis ajas närvi. Mingit eraldi süsteemi meil väga uhket ei ole, panen ise asjad kirja ja kui sama mure kordub, siis vaatame otsa."}, {"type": "k", "k": "K10", "q": "Too palun üks konkreetne näide olukorrast, kus kliendi sisend muutis teie algset plaani, prioriteeti või lahendust.", "a": "Üks konkreetne koht oli siis, kui me alguses mõtlesime, et hakkame hoolduslepinguga klientidele lihtsalt soodsamat tunnihinda andma ja kõik. Siis üks väiksema poeketi juht ütles mulle üsna otse, et teda ei huvita see paar eurot tunnis, kui tema lett seisab ja ta ei saa kedagi kätte. Sealt me keerasime plaani ringi: panime hoolduslepingule kindlama reageerimisaja ja eraldi telefonijärjekorra, no vähemalt tööpäeva sees, mitte ainult hinna teema. See tähendas meile rohkem jamamist graafikuga ja ausalt, ega see kerge pole siiani, aga kliendi jaoks oli see päris asi, mitte allahindlus paberil."}]}, {"nr": 4, "title": "SUHTUMINE TEENUSEDISAINI / KASUTAJAKESKSUSESSE", "tpb": "TPB: Attitude + Behavioural Beliefs", "qa": [{"type": "k", "k": "K11", "q": "Millist väärtust sa näed kasutajakeskses lähenemises? Põhjenda oma arvamust.", "a": "Ma näen selle väärtust siis, kui see aitab päris probleemi väiksemaks teha, mitte niisama juttu juurde toota. Kui ma kuulen kliendilt korduvalt, et kõige hullem pole isegi remondi hind, vaid see, et ta ei tea, millal tehnik tuleb või kas külmik seisab pool päeva, siis sealt tulebki meile selge koht, mida parandada. Ehk kui me võtame nende vaate päriselt arvesse, saame töökorralduse selgemaks, vähem tühje lubadusi ja vähem närvilisi kõnesid. Meie puhul tähendab see otseselt seda, et seisak lüheneb, klient jääb alles ja hoolduslepingut on lihtsam müüa. Noh, minu jaoks on selle asja väärtus üsna lihtne: kui kliendil on lihtsam ja meil on vähem kaost, siis on mõtet."}, {"type": "k", "k": "K12", "q": "Millised on sinu meelest kasutajakeskse lähenemise kitsaskohad või piirangud?", "a": "Meeskond suhtub sellesse pigem praktiliselt, mitte mingi suure põhimõttena. Kui kliendi jutt aitab neil päeva lihtsamaks teha, vähem edasi-tagasi sõitu tekitada või objektil vähem segadust olla, siis ollakse kohe poolt. Aga kui see tähendab nende jaoks lihtsalt rohkem helistamist, märkmete tegemist või mingit lisaringi enne tööle minekut, siis tuleb nurin päris ruttu. Tehnikud tahavad üldiselt selget infot: mis viga, kuhu minna, mis ajaks valmis saada. Ehk neil ei ole selle vastu midagi, et kliendi järgi asju sättida, aga nad ei taha, et sellest tekiks järjekordne kontoritöö nende kaela."}]}, {"nr": 5, "title": "SOTSIAALSED JA PROFESSIONAALSED MÕJUTAJAD", "tpb": "TPB: Subjective Norm", "qa": [{"type": "k", "k": "K13", "q": "Kuidas sinu meeskond/kolleegid suhtuvad kasutajakesksesse lähenemisse ja miks?", "a": "Meil juhtkond on sisuliselt mina ise, noh, perefirma taust on ka all, aga igapäevased arendusotsused tulevad lõpuks minu laualt. Minu suhtumine on see, et klienti peab kuulama küll, aga mitte nii, et iga kõne peale hakkame teenust ringi tegema. Sest kui sa väikeses 6-inimeselises firmas iga soovi järgi hüppad, siis varsti ei saa enam ise ka aru, mida sa üldse pakud ja kellele. Samas kui mitu klienti ütleb sama asja, eriti need, kellel on päriselt seadmed kriitilised ja kes meile kuust kuusse raha sisse toovad, siis ma võtan seda väga tõsiselt.\n\nÜks päris hea näide oli eelmine suvi, kui oli palav periood ja rikked lõid üles täpselt samal ajal. Meil tuli umbes kahe nädala jooksul järjest kõnesid kohvikutelt ja väiksematelt poodidelt, aga kõige valusamalt jäi meelde üks toidupood, kelle poejuht ütles mulle üsna konkreetselt, et “mul ei ole vaja, et sa lubad viis korda tagasi helistada, mul on vaja teada, kas tehnik jõuab täna või ei jõua.” See oli ebamugav kuulata, sest tegelikult tal oli õigus. Meie mõte oli seni olnud, et kõige tähtsam on kiiresti kohale saada, aga kliendi jaoks oli sama tähtis see, et keegi ütleks ausalt, mis seis on. Peale seda ma ei muutnud ainult reageerimise järjekorda, vaid panime endal paika, et kui tehnik ei jõua nelja tunni sees, siis klient saab vähemalt konkreetse info, mitte lihtsalt “vaatame”.\n\nSee tuli täiesti kliendi survest, mitte sellest, et ma oleks ise kontoris suure avastuse teinud. Ja miks ma üldse klienti sellesse kaasan või kuulan? Sest tema näeb seda kohta, kus meie lubadus päris elus katki läheb. Mina võin vaadata õhtul Excelit ja väljakutsete arvu, aga klient ütleb otse välja, mis teda närvi ajab. Tehnik ütleb, et päev oli hull, klient ütleb, et tal läks kaup halvaks. Need on kaks eri asja.\n\nAga ma ütlen ausalt, ma ei usu sellesse, et peaks tegema pikki koosolekuid klientidega või mingeid ilusaid aruteluringe. Meie kliendid ei taha seda ka. Poepidajal ei ole aega arutada teenuse kontseptsiooni, ta tahab, et lett oleks külm ja asi töötaks. Nii et meie kaasamine on hästi praktiline: telefon, objekt, järelkõne, vahel küsin ise otse, mis teid kõige rohkem häiris ja mis oleks aidanud. Kui sealt tuleb korduv muster, siis ma liigutan midagi.\n\nMiks juhtkond selliselt suhtub, ongi vist see, et maine on meil väikesel turul väga habras. Üks kehv nädal ja sellest räägitakse edasi. Teine põhjus on raha. Kui ma teen muudatuse, mis kliendi jaoks tegelikult midagi ei paranda, siis see on meie jaoks puhas kulu. Nii et ma tahan kliendi sisendit, aga pigem filtriga. Kõike ei saa sisse võtta. Mõni klient tahab, et oleks ööpäevaringne valmisolek, aga samas ei taha hoolduslepingut ega kõrgemat hinda. Seda ma lihtsalt ei saa lubada. Ehk siis klienti kuulame palju, aga otsuse teen lõpuks mina selle järgi, kas me suudame selle ka sõnapidamisega välja kanda."}, {"type": "k", "k": "K14", "q": "Kuidas juhtkond suhtub klientide kaasamisse arendusotsuste tegemisel? Miks?", "a": "Mind on rohkem mõjutanud teised samas valdkonnas tegijad ja konkurendid kui mingid kiirendid või mentorid; vaatan, mida nad lubavad ja kas suudavad seda päriselt pidada. Kui näen, et kellelgi toimib näiteks hoolduslepingu loogika paremini, siis proovin oma moodi järgi."}, {"type": "k", "k": "K14.1", "q": "Kes on olnud eeskujuks? Miks on eeskuju?", "a": "Mul ei ole olnud sellist ühte suurt eeskuju, et loed kuskilt raamatust või käid kellegi järel, seda mitte. Pigem on mulle eeskujuks olnud paar vanema kooli tehnikameest, kellega ma algusaastatel kokku puutusin, just selle pärast, et nad ei ajanud udu, vaid ütlesid kliendile ausalt ära, mis on katki, mis maksab ja millal valmis saab. See on mulle hästi külge jäänud. Üks neist töötas kunagi suuremas hooldusfirmas ja ma nägin kõrvalt, kuidas ta suutis ka närvilise poeomaniku maha rahustada lihtsalt sellega, et rääkis konkreetselt ja tuli lubatud ajaks tagasi. Noh, mitte jutuga, vaid teoga.\n\nTeine eeskuju on ausalt meie ühe püsikliendi, väikse poeketi omanik. Ta ei ole küll minu eriala inimene, aga tema on mulle õpetanud seda, et süsteem peab töötama ka siis, kui omanik ise iga asja juures ei seisa. Paar aastat tagasi ütles ta mulle üsna otse, et “sul on hea teenus, aga kõik käib liiga palju sinu kaudu”. See jäi kummitama. Pärast seda hakkasin rohkem suruma hoolduslepingute kindlat reageerimiskorda ja panime kasvõi lihtsal tasemel kirja, kelle kõne läheb esimesena töösse.\n\nMiks nad on eeskujuks? Sest nad ei tee asja ilusaks, vaid töökindlaks. Mulle läheb see korda rohkem kui mingi suur jutt arengust. Kui klient saab abi, seade töötab ja lubadus peab, siis see ongi minu jaoks tase, mille poole vaadata. Samas, noh, eks ma ise olen selles õppimises alles poole tee peal."}, {"type": "k", "k": "K15", "q": "Kuidas on sinu suhtumist või praktikaid mõjutanud laiem ettevõtluskeskkond, näiteks kiirendid, mentorid, sarnased ettevõtted või konkurendid?", "a": "Ei ole, sellist formaalset kokkupuudet mul olnud ei koolituse ega meistriklassi mõttes. Praktikat on mõjutanud rohkem kliendi kõned, oma vead ja see, mida teised tegijad turul päriselt ära teevad."}, {"type": "k", "k": "K16", "q": "Kas sul on olnud formaalne kokkupuude teenusedisaini metoodikaga – koolitused, programmid, meistriklassid vms?", "a": "Jah, üks selline olukord oli eelmisel suvel, kui tahtsin ühe meie püsikliendist kohvikuketiga hoolduskorra natuke targemaks teha, et nad ei helistaks meile alles siis, kui vitriin juba soe on. Mõte oli lihtne: istume nende piirkonnajuhi ja kahe kohviku vahetusevanemaga maha, käime läbi, mis sümptomid enne riket tavaliselt tekivad, kes mida märkab ja mis hetkel peaks meile teada andma. Paberil tundus väga mõistlik, sest meil oli nendega kolme kuuga seitse erakorralist väljakutset, millest vähemalt kolm oleks ilmselt varem märkamisega pehmemalt läinud. Ma sain piirkonnajuhiga jutule küll, tema ütles ka, et teeme ära, aga siis hakkas nende sees asi venima. Vahetused vaheldusid, üks juhataja läks puhkusele, teisel oli töötajate puudus ja lõpuks oli nii, et iga kord, kui proovisin aega leida, tuli neil mingi oma tulekahju ette.\n\nMeie poolt oli ka takistus, ega ma seda ainult nende kaela ei aja. Mul endal oli samal ajal kaks suuremat paigaldust pooleli ja paar tehnikut puhkusel, nii et ma lükkasin seda kohtumist ise ka mitu korda edasi, sest päev lihtsalt jooksis käest ära. Lõpuks tegime asja poolikult telefoni teel, aga see ei töötanud, sest kohapeal oleks pidanud seadme juures näitama, mida kuulata või vaadata. Sealt ma sain päris selgelt aru, et kui tahad klienti rohkem kaasa võtta, siis ainult hea tahtmine ei piisa, peab mõlemal poolel olema päriselt aeg kinni pandud ja inimene vastutamas. Muidu jääbki nii, et kõik saavad aru, et oleks kasulik, aga keegi ei vea lõpuni. Ja väikse ettevõttena on see valus koht, sest kui mina parasjagu ei suru, siis see asi lihtsalt vajub laiali."}]}, {"nr": 6, "title": "VÕIMEKUS JA BARJÄÄRID", "tpb": "TPB: Perceived Behavioural Control", "qa": [{"type": "k", "k": "K17", "q": "Kirjelda ühte olukorda, kus oleksid tahtnud klienti rohkem kaasata, aga see ei õnnestunud. Mis sai takistuseks ja miks?", "a": "Ma tahaks järgmistes arendustes kliendi kaasamise teha vähem juhuslikuks, see on vist kõige ausam vastus. Praegu on nii, et klient räägib siis, kui tal on mure käes, külmik soe või lett seisab, ja meie õpime sellest tulekahju pealt. See töötab mingi piirini, aga no const RATING_STATEMENTS = {"2":{"title":"Käitumine ja arenduspraktika","items":[["2.1","Intervjueeritav kirjeldab oma praegust arendus- või otsustusprotsessi piisavalt detailselt."],["2.2","Vastused sisaldavad konkreetseid näiteid, numbreid või situatsioonikirjeldusi, mitte ainult üldistusi."],["2.3","Intervjueeritav räägib oma isiklikust kogemusest, mitte üldistest tõdedest."]]},"3":{"title":"Kliendi kaasamine ja tagasiside","items":[["3.1","Intervjueeritav toob konkreetseid näiteid olukordadest, kus kliendi sisend mõjutas otsuseid."],["3.2","Intervjuust selgub, kuidas tagasiside kogumine ja rakendamine praktiliselt toimub."],["3.3","Vastused tunduvad loomulikud ja elulähedased."]]},"4":{"title":"Hoiakud (Attitude)","items":[["4.1","Intervjueeritav väljendab selgelt oma suhtumist kasutajakesksesse lähenemisse (positiivne, negatiivne või ambivalentne)."],["4.2","Intervjueeritav toob välja konkreetseid põhjuseid, miks ta kasutajakeskset lähenemist väärtustab või ei väärtusta."],["4.3","Intervjueeritav kirjeldab kasutajakeskse lähenemise tajutud kasu või kahju oma ettevõtte kontekstis."]]},"5":{"title":"Subjektiivsed normid (Subjective Norm)","items":[["5.1","Intervjuust selgub, kuidas meeskond, kolleegid või juhtkond suhtuvad kasutajakesksesse lähenemisse."],["5.2","Intervjueeritav kirjeldab väliseid mõjutajaid (konkurendid, mentorid, koolitused, valdkond), mis on tema praktikaid kujundanud."],["5.3","Intervjuust tuleb välja, kas klientide kaasamine toimub sisemisest soovist või välisest survest."]]},"6":{"title":"Tajutud käitumiskontroll (Perceived Behavioural Control)","items":[["6.1","Intervjueeritav nimetab konkreetseid takistusi, mis piiravad kasutajakeskse lähenemise rakendamist (aeg, raha, oskused, struktuur vms)."],["6.2","Intervjueeritav kirjeldab tegureid, mis soodustavad või toetavad kasutajakeskset lähenemist tema ettevõttes."],["6.3","Intervjueeritav annab hinnangu oma võimekusele kasutajakeskseid praktikaid rakendada."]]},"7":{"title":"Kavatsus ja tulev // === Olek ===
const state = {
    step: "intro",
    consent: null,
    assignment: null,
    ratings: {},
    feedback: {},
    startTime: Date.now(),
};

// === Fikseeritud paar, juhuslik järjekord ===
function pickRandomTwo() {
    const order = Math.random() < 0.5 ? "A_first" : "B_first";
    if (order === "A_first") {
        return { first: INTERVIEWS[0], second: INTERVIEWS[1], order };
    } else {
        return { first: INTERVIEWS[1], second: INTERVIEWS[0], order };
    }
}

// === Render funktsioonid ===
function el(tag, attrs = {}, ...children) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") e.className = v;
        else if (k === "html") e.innerHTML = v;
        else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
    }
    for (const c of children) {
        if (typeof c === "string") e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
    }
    return e;
}

function clearContent() {
    document.getElementById("content").innerHTML = "";
}

function renderProgress(text, percent) {
    const c = document.getElementById("progress-container");
    c.innerHTML = `<div class="progress">${text}<div class="progress-bar"><div class="progress-bar-fill" style="width:${percent}%"></div></div></div>`;
}

// === Step 1: Intro + Consent ===

        <p>Kogu uuring võtab aega umbes <strong>25–35 minutit</strong>. Palun plaani enda jaoks katkematu aeg, et saaksid intervjuusid rahulikult lugeda ja hinnata kohe pärast iga plokki.</p>

            <li><strong>1</strong> = ei nõustu üldse</li>
            <li><strong>2</strong> = pigem ei nõustu</li>

            <li><strong>4</strong> = pigem nõustun</li>
            <li><strong>5</strong> = nõustun täielikult</li>
        </ul>
        <p>PLOKK 1 (sissejuhatus ja taust) all hindamist <strong>EI OLE</strong> — see plokk tutvustab intervjueeritavat ja loob konteksti, loe see lihtsalt läbi.</p>

        <h2>Nõusolek osalemiseks</h2>
        <p>Osalen vabatahtlikult ja mõistan, et:</p>
        <ul>
            <li>minu vastused on anonüümsed ja neid kasutatakse ainult selle magistritöö analüüsis;</li>
            <li>ma võin igal hetkel uuringu katkestada, ilma et sellel oleks minu jaoks tagajärgi;</li>

        </ul>
        <div class="consent-options">

        </div>
        <div id="consent-error"></div>
        <button class="btn" id="consent-next">Edasi</button>
    `}));
    document.getElementById("consent-next").addEventListener("click", () => {
        const sel = document.querySelector('input[name="consent"]:checked');
        if (!sel) {
            document.getElementById("consent-error").innerHTML = '<div class="error-msg">Palun vali üks variant.</div>';
            return;
        }
        if (sel.value === "no") {
            clearContent();
            document.getElementById("content").appendChild(el("div", { class: "card", html: `
                <h1>Aitäh!</h1>
                <p>Mõistame su otsust. Kui muudad meelt, võid alati lehe uuesti avada.</p>
            `}));
            return;
        }
        state.consent = "yes";
        state.assignment = pickRandomTwo();
        renderInterview(0);
    });
}

// === Step 3-4: Render Interview ===
function renderInterview(idx) {
    state.step = "interview_" + idx;
    clearContent();
    const stepNum = idx === 0 ? 2 : 3;
    renderProgress(`Samm ${stepNum}/4 — Intervjuu ${idx + 1}/2`, 25 + idx * 35);
    const interview = idx === 0 ? state.assignment.first : state.assignment.second;
    const root = document.getElementById("content");

    // Sissejuhatuse kaart
    root.appendChild(el("div", { class: "card", html: `
        <p class="meta">Intervjuu ${idx + 1} / 2</p>
        <h1>Järgneb intervjuu transkriptsioon</h1>
        <p>Loe iga plokk hoolikalt läbi ja hinda kohe selle all olevat skaalat, enne kui järgmisesse plokki liigud.</p>
        <p>Intervjuu on jaotatud 7 plokiks. Esimene plokk (sissejuhatus ja taust) on ilma hindamiseta — loe lihtsalt läbi.</p>
    `}));

    // Iga plokk eraldi kaardina
    interview.blocks.forEach(block => {
        const card = el("div", { class: "card" });
        card.innerHTML = `
            <p class="meta">Plokk ${block.nr} / 7</p>
            <h2>PLOKK ${block.nr}. ${block.title}</h2>
            ${block.tpb ? `<p class="tpb">${block.tpb}</p>` : ""}
        `;
        // Q&A
        block.qa.forEach(qa => {
            if (qa.type === "k") {
                const div = el("div", { class: "qa" });
                div.innerHTML = `
                    <p class="question"><strong>${qa.k}:</strong> ${escapeHtml(qa.q)}</p>
                    <p class="answer"><strong>Vastaja:</strong> ${escapeHtml(qa.a)}</p>
                `;
                card.appendChild(div);
            } else if (qa.type === "interv") {
                const div = el("div", { class: "qa intervjueerija" });
                div.innerHTML = `
                    <p class="question">${escapeHtml(qa.q)}</p>
                    <p class="answer"><strong>Vastaja:</strong> ${escapeHtml(qa.a)}</p>
                `;
                card.appendChild(div);
            }
        });

        // Hindamisskaala (mitte plokk 1)
        if (block.nr >= 2 && block.nr <= 7) {
            const ratingBox = renderRatingBox(idx, interview.id, block.nr);
            card.appendChild(ratingBox);
        }
        root.appendChild(card);
    });

    // Plokk 8 — Vastuste loomulikkus ja kvaliteet (pärast viimast sisulist plokki)
    const generalCard = el("div", { class: "card" });
    generalCard.innerHTML = `
        <p class="meta">Intervjuu kvaliteet ja üldmulje</p>
        <h2>PLOKK 8. Intervjuu kvaliteet ja üldmulje</h2>
        <p>Selles plokis hindad intervjuu üldist kvaliteeti terves ulatuses, tuginedes kõigele, mida just lugesid.</p>
    `;
    generalCard.appendChild(renderRatingBox(idx, interview.id, 8));
    root.appendChild(generalCard);

    // Plokk 9 — Lahtised küsimused (vabatekst)
    const textCard = el("div", { class: "card" });
    textCard.innerHTML = `
        <p class="meta">Lahtised küsimused</p>
        <h2>PLOKK 9. Lahtised küsimused</h2>
        <p>Palun vasta lühidalt järgmistele küsimustele.</p>

        <div class="form-field">
            <label><strong>9.1</strong> — Kas midagi tundus selles intervjuus ebatavaline, tehislik või ebaloomulik? Kui jah, siis mis täpselt?</label>
            <textarea id="feedback-${idx}-91" rows="4"></textarea>
        </div>

        <div class="form-field">
            <label><strong>9.2</strong> — Kui peaksid pakkuma, kas see intervjuu on tehtud päris inimesega või tehisintellektiga, siis kumba sa arvaksid? Miks?</label>
            <textarea id="feedback-${idx}-92" rows="4"></textarea>

        class: "btn",

    }, idx === 0 ? "Edasi teisele intervjuule" : "Lõpetan ja saadan vastused");

function renderRatingBox(idx, interviewId, blockNr) {
    const box = el("div", { class: "rating-box" });
    const blockData = RATING_STATEMENTS[blockNr];
    box.innerHTML = `<h4>✏️ HINDAMINE: ${escapeHtml(blockData.title)}</h4><p class="scale-info">Skaala: 1 = ei nõustu üldse · 2 = pigem ei nõustu · 3 = nii ja naa · 4 = pigem nõustun · 5 = nõustun täielikult</p>`;
    blockData.items.forEach(([code, text]) => {
        const stmt = el("div", { class: "rating-statement" });
        const key = `i${idx}_${interviewId}_${blockNr}_${code}`;
        stmt.innerHTML = `
            <p class="text"><strong>${code}</strong> — ${escapeHtml(text)}</p>
            <div class="rating-scale">
                ${[1,2,3,4,5].map(n => `
                    <label>
                        <input type="radio" name="${key}" value="${n}">
                        <span class="num">${n}</span>
                    </label>
                `).join("")}
            </div>
        `;
        box.appendChild(stmt);
    });
    return box;
}

    // Kontrolli kõik hindamised (plokid 2-9)
    [2,3,4,5,6,7,8].forEach(blockNr => {
        const blockData = RATING_STATEMENTS[blockNr];
        blockData.items.forEach(([code, _]) => {
            const key = `i${idx}_${interview.id}_${blockNr}_${code}`;
            const sel = document.querySelector(`input[name="${key}"]:checked`);
            if (!sel) {
                const label = blockNr === 8 ? "Plokk 8 (kvaliteet ja koondhinne)" : "Plokk " + blockNr;
                missing.push(`${label} – ${code}`);
            } else {
                state.ratings[key] = sel.value;
            }
        });
    });

    if (missing.length > 0) {
        errDiv.innerHTML = `<div class="error-msg"><strong>Palun täida kõik hindamised enne edasiminekut.</strong><br>Puudub: ${missing.slice(0, 5).join(", ")}${missing.length > 5 ? ` ja veel ${missing.length - 5}…` : ""}</div>`;
        // Scroll esimese puuduva juurde
        const firstMissingParts = missing[0].split(" – ");
        const firstCode = firstMissingParts[1];
        const firstBlockNr = firstCode.split(".")[0];
        const firstMissingKey = `i${idx}_${interview.id}_${firstBlockNr}_${firstCode}`;
        const firstMissingEl = document.querySelector(`input[name="${firstMissingKey}"]`);
        if (firstMissingEl) firstMissingEl.closest(".rating-statement").scrollIntoView({ behavior: "smooth", block: "center" });
        return;
    }

    // Salvesta vabatekstid (9.3, 9.4, 9.5)
    const fb91 = document.getElementById(`feedback-${idx}-91`);
    const fb92 = document.getElementById(`feedback-${idx}-92`);
    state.feedback[`i${idx}_${interview.id}_91`] = fb91 ? fb91.value : "";
    state.feedback[`i${idx}_${interview.id}_92`] = fb92 ? fb92.value : "";

    if (idx === 0) {
        renderInterview(1);
    } else {
        submitData();
    }
}

// === Step 5: Submit ===
async function submitData() {
    state.step = "submitting";
    clearContent();
    renderProgress("Samm 4/4 — Saadan vastused", 95);
    const root = document.getElementById("content");
    root.appendChild(el("div", { class: "card", html: `
        <h1>Saadan vastuseid…</h1>
        <p>Palun oota hetk.</p>
    `}));

    const elapsedMin = Math.round((Date.now() - state.startTime) / 60000);
    const first = state.assignment.first;
    const second = state.assignment.second;

    const payload = {
        _subject: "Paar " + PAIR_NR + " — " + first.label + " vs " + second.label,
        pair_nr: PAIR_NR,
        consent: state.consent,
        order: state.assignment.order,
        elapsed_minutes: elapsedMin,
        intervjuu_1_id: first.id,
        intervjuu_1_nimi: first.label,
        intervjuu_2_id: second.id,
        intervjuu_2_nimi: second.label,
        ratings_json: JSON.stringify(state.ratings),
    };

    // Vabatekstid
    payload["intervjuu1_" + first.label + "_vaba_9_1"] = state.feedback["i0_" + first.id + "_91"] || "(tühi)";
    payload["intervjuu1_" + first.label + "_vaba_9_2"] = state.feedback["i0_" + first.id + "_92"] || "(tühi)";
    payload["intervjuu2_" + second.label + "_vaba_9_1"] = state.feedback["i1_" + second.id + "_91"] || "(tühi)";
    payload["intervjuu2_" + second.label + "_vaba_9_2"] = state.feedback["i1_" + second.id + "_92"] || "(tühi)";

    // Lisa iga hindamine selge loetava väljanimega Formspree-s
    Object.entries(state.ratings).forEach(function(entry) {
        var k = entry[0];
        var v = entry[1];
        var parts = k.match(/^i(\d+)_(.+?)_(\d+)_(\d+\.\d+)$/);
        if (parts) {
            var iIdx = parseInt(parts[1]);
            var blockNr = parts[3];
            var stmtNr = parts[4];
            var intLabel = iIdx === 0 ? first.label : second.label;
            var intNum = iIdx === 0 ? 1 : 2;
            payload["intervjuu" + intNum + "_" + intLabel + "_P" + blockNr + "_" + stmtNr] = v;
        }
    });

    try {
        const res = await fetch(FORMSPREE_URL, {
            method: "POST",
            headers: { "Accept": "application/json", "Content-Type": "application/json" },
            body: JSON.stringify(payload),
        });
        if (res.ok) {
            renderDebriefing();
        } else {
            throw new Error("Server returned " + res.status);
        }
    } catch (err) {
        clearContent();
        document.getElementById("content").appendChild(el("div", { class: "card", html: `
            <h1>Viga andmete saatmisel</h1>
            <div class="error-msg">Vastuseid ei õnnestunud saata: ` + escapeHtml(err.message) + `</div>
            <p>Palun proovi uuesti.</p>
            <button class="btn" onclick="submitData()">Proovi uuesti</button>
        `}));
    }
}

// === Step 6: Debriefing ===
function renderDebriefing() {
    state.step = "done";
    clearContent();
    renderProgress("Valmis!", 100);
    const root = document.getElementById("content");
    root.appendChild(el("div", { class: "card", html: `
        <h1>Aitäh osalemise eest!</h1>
        <div class="success-msg"><strong>Sinu vastused on edukalt saadetud.</strong></div>
        <p>Sinu hinnangud aitavad oluliselt kaasa minu magistritöö valmimisele.</p>

        <p>Kui sul on küsimusi uuringu kohta või soovid teada tulemusi, võid minuga ühendust võtta.</p>
        <p style="margin-top: 32px;"><strong>Veel kord suur aitäh!</strong><br>Katrin Primak</p>
    `}));
}

// === Helpers ===
function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

// === Käivita ===
renderIntro();

</script>
